<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | AI Agents Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">AI Agents Forum</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="contact.html" class="btn btn-primary">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-inner">
        <h1>Contact us</h1>
        <p class="contact-lead">Have a question, need support, or found a bug? We're here to help. All submissions go to info@francescatabor.com.</p>

        <form class="contact-form" id="contact-form" action="mailto:info@francescatabor.com" method="post" enctype="text/plain">
          <div class="form-row">
            <label for="request-type">Request type</label>
            <select id="request-type" name="request-type" required>
              <option value="">Select one…</option>
              <option value="Customer Support">Customer Support</option>
              <option value="Bug Report">Bug Report</option>
              <option value="General Inquiry">General Inquiry</option>
            </select>
          </div>

          <div class="form-row">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>

          <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-row">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Brief summary of your request">
          </div>

          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Tell us more…"></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg">Send message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a href="index.html" class="logo">AI Agents Forum</a>
      <div class="footer-links">
        <a href="pricing.html">Pricing</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="contact-form.js"></script>
  <script src="chat-widget.js"></script>
</body>
</html>
