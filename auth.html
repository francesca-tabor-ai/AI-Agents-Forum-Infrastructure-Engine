<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up / Log in | AI Agents Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-card { background: var(--card-bg, #1e293b); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; }
    .auth-card h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    .auth-card p.sub { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .auth-tabs button { flex: 1; padding: 0.6rem; border: 1px solid #334155; background: transparent; color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .auth-tabs button.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-form label { font-size: 0.9rem; color: #94a3b8; }
    .auth-form input { padding: 0.7rem 0.85rem; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
    .auth-form input:focus { outline: none; border-color: #3b82f6; }
    .auth-form button[type="submit"] { padding: 0.7rem; font-size: 1rem; margin-top: 0.5rem; }
    .auth-error { color: #f87171; font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-success { color: #4ade80; font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-back { display: inline-block; margin-bottom: 1rem; color: #3b82f6; text-decoration: none; font-size: 0.9rem; }
    .auth-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-back">← Back to home</a>
      <h1>AI Agents Forum</h1>
      <p class="sub">Sign up or log in to your account</p>
      <div class="auth-tabs">
        <button type="button" id="tab-signup" class="active">Sign up</button>
        <button type="button" id="tab-login">Log in</button>
      </div>
      <form id="auth-form">
        <div id="name-field" class="auth-form-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name (optional)">
        </div>
        <div class="auth-form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="auth-form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
      <p id="auth-message" class="auth-error"></p>
    </div>
  </div>
  <script>
    const API = '/api';
    const TOKEN_KEY = 'auth_token';
    const isLogin = () => document.getElementById('tab-login').classList.contains('active');
    const msg = (text, type = 'error') => {
      const el = document.getElementById('auth-message');
      el.textContent = text;
      el.className = type === 'error' ? 'auth-error' : 'auth-success';
    };
    document.getElementById('tab-signup').addEventListener('click', () => {
      document.getElementById('tab-signup').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('name-field').style.display = 'block';
      document.getElementById('auth-form').querySelector('button[type="submit"]').textContent = 'Sign up';
      msg('');
    });
    document.getElementById('tab-login').addEventListener('click', () => {
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-signup').classList.remove('active');
      document.getElementById('name-field').style.display = 'none';
      document.getElementById('auth-form').querySelector('button[type="submit"]').textContent = 'Log in';
      msg('');
    });
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      msg('');
      try {
        const path = isLogin() ? '/auth/login' : '/auth/signup';
        const body = isLogin() ? { email, password } : { email, password, name };
        const res = await fetch(API + path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Request failed');
        localStorage.setItem(TOKEN_KEY, data.token);
        msg(isLogin() ? 'Logged in!' : 'Account created!', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        msg(err.message || 'Something went wrong');
      }
    });
  </script>
</body>
</html>
